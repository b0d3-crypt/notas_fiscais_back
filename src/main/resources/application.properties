spring.application.name=notas-fiscais

# DATASOURCE
spring.datasource.url=jdbc:postgresql://localhost:5432/notas_fiscais
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# FLYWAY
spring.flyway.url=jdbc:postgresql://localhost:5432/notas_fiscais
spring.flyway.user=postgres
spring.flyway.password=1234
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=x!A@r#L$k%9^b&N*u(w)e-r_s+t=3z4x5c6v7b8n9m0q
jwt.expiration=86400000

# FILE STORAGE
upload.dir=/home/danilo/Imagens/notas

# MULTIPART
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# CORS
cors.allowed-origins=http://localhost:4200

# SERVER
server.port=8080
